name: Sync exports from Notion

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *" # hourly; adjust as desired

permissions:
  contents: write

concurrency:
  group: notion-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm i @notionhq/client

      - name: Sync all Ready-to-sync exports
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }} 
        run: node scripts/notion_sync.mjs

      - name: Commit and push (if changes)
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "notion-sync-bot"
            git config user.email "notion-sync-bot@users.noreply.github.com"
            git add -A
            git commit -m "Sync from Notion export"
            git push
          else
            echo "No changes to commit."
          fi