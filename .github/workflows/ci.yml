name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (server + client)
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/sixert_ci
          JWT_ACCESS_SECRET: ci_dummy_jwt_access_secret_32_chars_min
          JWT_REFRESH_SECRET: ci_dummy_jwt_refresh_secret_32_chars_min
          CLIENT_URL: http://localhost:4200
          NODE_ENV: production
